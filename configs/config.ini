# Appium 2.x configuration
# Note: Non-standard capabilities require the 'appium:' prefix in W3C mode.
# ConfigReader.get_android_config() / get_ios_config() already add these prefixes.

[ANDROID]
platformName = Android
platformVersion = 13
deviceName = emulator-5554
automationName = UiAutomator2
appPackage = com.example.app
appActivity = com.example.app.MainActivity
noReset = true
fullReset = false

[IOS]
platformName = iOS
platformVersion = 17.0
deviceName = iPhone 15
automationName = XCUITest
bundleId = com.example.app
noReset = true
fullReset = false

[APPIUM]
# Appium 2.x default base URL (no /wd/hub suffix required)
appium_server = http://127.0.0.1:4723

[TIMEOUTS]
implicit_wait = 10
explicit_wait = 20
